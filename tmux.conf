# Tmux settings
# Steen Hegelund
# Time-Stamp: 2026-Jul-03 11:13

unbind C-b
set-option -g prefix C-a
bind-key -N "Send the prefix key (C-a) to the application" C-a send-prefix

set-option -g status-left "#{prefix_highlight}[#{session_name}] "
set-option -g status-right " \"#{host_short}\" %d-%b-%y %H:%M"
set-option -g status-left-length 50
set-option -g status-right-length 50

bind-key -N "Split pane below (same directory)" - split-window -v -c "#{pane_current_path}"
bind-key -N "Split pane to the right (same directory)" . split-window -h -c "#{pane_current_path}"

bind-key -N "Resize pane left by 2"  -n M-S-Left  resize-pane -L 2
bind-key -N "Resize pane right by 2" -n M-S-Right resize-pane -R 2
bind-key -N "Resize pane up by 2"    -n M-S-Up    resize-pane -U 2
bind-key -N "Resize pane down by 2"  -n M-S-Down  resize-pane -D 2

bind-key -N "New window (same directory)" c new-window -c "#{pane_current_path}"

set -s escape-time 0
set-option -g base-index 1
set-option -g renumber-windows on

bind-key -N "Break pane into a background window" b break-pane -d

# Move windows left and right
bind-key -N "Move window one position left" C-S-Left swap-window -t -1 \; previous-window
bind-key -N "Move window one position right" C-S-Right swap-window -t +1 \; next-window

# Move a window to the right in another session (focus stays)
bind-key -N "Move window to another session" w command-prompt -p "Move window to session:"  "move-window -adt '%%:$'"
# Move a pane to another window (focus stays)
bind-key -N "Move pane to another window" C-w command-prompt -p "Move pane to window:"  "move-pane -vdt ':%%'"

bind-key -N "Choose a session or window from a tree" C-j choose-tree

bind-key -N "Enter copy mode" + copy-mode
bind-key -N "Paste the most recent buffer" 0 paste-buffer

# Single copy workflow for screen and scrollback (do not use Alacritty Ctrl+Shift+C in tmux):
# S-PageUp: scroll back and enter copy mode (prefix + '+' to enter in place)
# v: begin selection (C-v for rectangle); extend with movement or S-PageUp/S-PageDown
# y or Enter: copy to the Wayland clipboard and exit
# set vi-mode
set-window-option -g mode-keys vi
# Use the Wayland clipboard for all copy actions (y, Enter, mouse drag)
set-option -g copy-command 'wl-copy'
# Vim style copy and paste
bind-key -N "Begin selection (vi)" -T copy-mode-vi v send-keys -X begin-selection
bind-key -N "Toggle rectangle selection (vi)" -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send -X begin-selection
bind-key -N "Copy selection to the system clipboard (vi)" -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -N "Copy selection to the system clipboard (Enter)" -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind-key -N "Paste from the system clipboard" p run "wl-paste --no-newline | tmux load-buffer - ; tmux paste-buffer"

# Keyboard scrollback: Shift+PageUp enters copy-mode, works over any app incl. Claude
bind-key -N "Enter copy mode and page up" -n S-PageUp copy-mode -u
bind-key -N "Page up (copy mode)" -T copy-mode-vi S-PageUp send-keys -X page-up
bind-key -N "Page down (copy mode)" -T copy-mode-vi S-PageDown send-keys -X page-down


# Nice keyboard mappings
bind-key -N "Send C-k to the pane" C-k "send-keys C-k"
bind-key -N "Send C-k to the pane" -n C-D "send-keys C-k"
bind-key -N "Send C-d to the pane" C-d "send-keys C-d"

# Scrollback: keyboard via Shift+PageUp (above) or wheel; Shift+drag for native selection
set -g history-limit 100000
set -g mouse on

# Clear scrollback buffer
bind-key -N "Clear the scrollback buffer" C-o clear-history

# Set true-color in various terminals
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",tmux-direct:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# PaperColor Light status theme (was defined inline; now a plugin)
set -g @plugin 'StonyBoy/tmux-papercolor-light'
set -g @plugin 'jabirali/tmux-tilish'
set -g @plugin 'sunaku/tmux-navigate'
# Searchable, live key-binding browser (and more) via fzf: prefix + F
set -g @plugin 'sainnhe/tmux-fzf'

# Set up navigation (do not use tilish-navigate)
set -g @navigate-left  '-n C-h'
set -g @navigate-down  '-n C-j'
set -g @navigate-up    '-n C-k'
set -g @navigate-right '-n C-l'
set -g @navigate-back  '-n C-\'

# Put log files here (tmux-logging plugin)
set -g @logging-path "~/Desktop"
set -g @screen-capture-path "~/Desktop"
set -g @save-complete-history-path "~/Desktop"

# Install `tpm` if needed.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Reload tmux configuration 
bind -N "Reload tmux configuration" R source-file ~/.tmux.conf \; display "Config reloaded"

# prefix+R : Reloads the configuration
# prefix+I : Installs plugins and reloads config
# prefix+U : Updates plugins and reloads config
# prefix+alt+u: remove/uninstall plugins not on the plugin list

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
