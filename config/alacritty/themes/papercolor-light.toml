# PaperColor (light). Higher contrast than Solarized Light: dark #444444 text
# on near-white #eeeeee. Palette from NLKNguyen/papercolor-theme.
# Imported by alacritty.toml via [general].import.

[bell]
color = "#d75f00"

[colors.primary]
background = "#eeeeee"
foreground = "#444444"

[colors.cursor]
cursor = "#444444"
text = "#eeeeee"

[colors.normal]
black = "#eeeeee"
red = "#af0000"
green = "#008700"
yellow = "#5f8700"
blue = "#0087af"
magenta = "#878787"
cyan = "#005f87"
white = "#444444"

[colors.bright]
black = "#bcbcbc"
red = "#d70000"
green = "#d70087"
yellow = "#8700af"
blue = "#d75f00"
magenta = "#d75f00"
cyan = "#005faf"
white = "#005f87"
