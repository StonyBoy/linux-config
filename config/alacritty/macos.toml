# The color palette lives in a separate theme file, imported below. Switch
# themes by changing this one path. Available: themes/papercolor-light.toml,
# themes/papercolor-dark.toml, themes/solarized-light.toml.
# Relative imports resolve against ~/.config/alacritty/ (where alacritty.toml
# is symlinked), so the themes dir is symlinked there too by install_config.py.
[general]
import = ["themes/papercolor-light.toml"]

[bell]
animation = "Ease"
duration = 10

[cursor]
blink_interval = 500

[cursor.style]
blinking = "Always"
shape = "Block"

[font]
size = 16

[font.bold]
family = "Inconsolata Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "Inconsolata Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "Inconsolata Nerd Font Mono"
style = "Italic"

[font.normal]
family = "Inconsolata Nerd Font Mono"
style = "Regular"

[font.offset]
x = 0
y = 1

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "PageUp"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "PageDown"
mods = "Control|Shift"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[window]
dynamic_title = true

[window.padding]
x = 6
y = 6
